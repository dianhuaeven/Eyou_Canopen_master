# ros_control controller 配置（4 摆臂模式）。

joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 100

flipper_csp_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - left_front_arm_joint
    - right_front_arm_joint
    - left_rear_arm_joint
    - right_rear_arm_joint
  allow_partial_joints_goal: true
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.05
    left_front_arm_joint: {trajectory: 0.10, goal: 0.03}
    right_front_arm_joint: {trajectory: 0.10, goal: 0.03}
    left_rear_arm_joint: {trajectory: 0.10, goal: 0.03}
    right_rear_arm_joint: {trajectory: 0.10, goal: 0.03}
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20

flipper_csv_forward_controller:
  type: flipper_control/JointGroupVelocityController
  joints:
    - left_front_arm_joint
    - right_front_arm_joint
    - left_rear_arm_joint
    - right_rear_arm_joint
  command_timeout: 0.25

